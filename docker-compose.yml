version: '3.8'

services:

  # Evolution API Database (Postgres)
  evolution-db:
    image: postgres:15-alpine
    container_name: waly-evolution-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${EVOLUTION_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${EVOLUTION_DB_PASSWORD:-waly_postgres_pass}
      POSTGRES_DB: ${EVOLUTION_DB_NAME:-evolution}
    volumes:
      - ./evolution_db_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"

  # Evolution API Cache (Redis)
  evolution-redis:
    image: redis:alpine
    container_name: waly-evolution-redis
    restart: unless-stopped
    volumes:
      - ./evolution_redis_data:/data

  # Evolution API Service
  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: waly-evolution-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - evolution-db
      - evolution-redis
    environment:
      - SERVER_TYPE=http
      - SERVER_PORT=8080
      - SERVER_URL=${EVOLUTION_API_URL:-http://localhost:8080}
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-waly_dev_api_key}
      
      # Database Configuration
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${EVOLUTION_DB_USER:-postgres}:${EVOLUTION_DB_PASSWORD:-waly_postgres_pass}@evolution-db:5432/${EVOLUTION_DB_NAME:-evolution}?schema=public
      - DATABASE_CONNECTION_CLIENT_NAME=waly
      
      # Cache Configuration (Redis)
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://evolution-redis:6379/1
      - CACHE_REDIS_PREFIX_KEY=evolution
      - CACHE_LOCAL_ENABLED=false
      
      # Save Data Preferences (optimized to avoid bloated db)
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=false
      - DATABASE_SAVE_DATA_CONTACTS=false
      - DATABASE_SAVE_DATA_CHATS=false
      - DATABASE_SAVE_DATA_HISTORIC=false
      - DATABASE_SAVE_MESSAGE_UPDATE=false
      - DATABASE_SAVE_DATA_LABELS=false

