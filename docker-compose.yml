version: '3.8'

services:
  # Caddy reverse proxy with automatic SSL
  caddy:
    image: caddy:latest
    container_name: risev-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN_API=${DOMAIN_API}
      - DOMAIN_EVO=${DOMAIN_EVO}
    depends_on:
      - pocketbase
      - evolution-go
    networks:
      - risev-network

  # PocketBase Go Backend
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: risev-pocketbase
    restart: unless-stopped
    working_dir: /pb
    command: serve --http=0.0.0.0:8090 --dir=/pb/pb_data --hooksDir=/pb/pb_hooks --migrationsDir=/pb/pb_migrations
    volumes:
      - ./pb_data:/pb/pb_data
      - ./pb_hooks:/pb/pb_hooks
      - ./pb_migrations:/pb/pb_migrations
    environment:
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
    networks:
      - risev-network

  # Litestream SQLite backup
  litestream:
    image: litestream/litestream:latest
    container_name: risev-litestream
    restart: unless-stopped
    volumes:
      - ./pb_data:/pb_data
      - ./litestream.yml:/etc/litestream.yml
    command: replicate
    depends_on:
      - pocketbase
    environment:
      - AWS_ACCESS_KEY_ID=${S3_ACCESS_KEY}
      - AWS_SECRET_ACCESS_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET}
      - S3_REGION=${S3_REGION}
    networks:
      - risev-network

  # Evolution API DB (PostgreSQL)
  evolution-db:
    image: postgres:15-alpine
    container_name: risev-evolution-db
    restart: unless-stopped
    command: postgres -c max_connections=300 -c shared_buffers=256MB -c idle_in_transaction_session_timeout=60000 -c idle_session_timeout=300000
    environment:
      POSTGRES_USER: ${EVOLUTION_DB_USER}
      POSTGRES_PASSWORD: ${EVOLUTION_DB_PASSWORD}
      POSTGRES_DB: ${EVOLUTION_DB_NAME}
    volumes:
      - ./evolution_db_data:/var/lib/postgresql/data
      - ./evolution_db_init:/docker-entrypoint-initdb.d
    networks:
      - risev-network

  # NOTE: PgBouncer removed 2026-07-17. whatsmeow (inside Evolution Go) uses
  # server-side prepared statements that break under PgBouncer session pooling
  # ("bind message supplies N parameters" desync -> driver: bad connection).
  # Evolution Go now connects directly to evolution-db:5432 (max_connections=300
  # is sized for it). If you re-add a pooler, do NOT route evolution-go through it.

  # Evolution API Cache (Redis)
  evolution-redis:
    image: redis:alpine
    container_name: risev-evolution-redis
    restart: unless-stopped
    volumes:
      - ./evolution_redis_data:/data
    networks:
      - risev-network

  # Evolution Go Whatsapp Service
  evolution-go:
    image: evoapicloud/evolution-go:latest
    container_name: risev-evolution-go
    restart: unless-stopped
    depends_on:
      - evolution-db
      - evolution-redis
    volumes:
      - ./evolution_instances:/evolution/instances
      - ./evolution_store:/evolution/store
    environment:
      - SERVER_NAME=risev-evolution-go
      - SERVER_PORT=8080
      - CLIENT_NAME=evolution
      - SERVER_URL=${EVOLUTION_API_URL}
      - GLOBAL_API_KEY=${EVOLUTION_API_KEY}
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
      # whatsmeow uses server-side prepared statements that break under PgBouncer
      # session pooling ("bind message supplies N parameters" desync -> driver: bad
      # connection). Point Evolution Go directly at Postgres; max_connections=300
      # on evolution-db is already sized for it.
      - POSTGRES_AUTH_DB=postgresql://${EVOLUTION_DB_USER}:${EVOLUTION_DB_PASSWORD}@evolution-db:5432/evogo_auth?sslmode=disable
      - POSTGRES_USERS_DB=postgresql://${EVOLUTION_DB_USER}:${EVOLUTION_DB_PASSWORD}@evolution-db:5432/evogo_users?sslmode=disable
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://evolution-redis:6379/1
      - CACHE_REDIS_PREFIX_KEY=evolution
      - DATABASE_SAVE_MESSAGES=false
      - CONNECT_ON_STARTUP=true
      - OS_NAME=Evolution GO
      - WADEBUG=INFO
      - LOGTYPE=console
      - WEBHOOK_FILES=true
    networks:
      - risev-network

  # Telegram Auto Payment & Gemini Receipt Verification Bot
  payment-bot:
    build:
      context: ./payment-bot
      dockerfile: Dockerfile
    container_name: risev-payment-bot
    restart: unless-stopped
    depends_on:
      - pocketbase
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL}
      - POCKETBASE_URL=http://pocketbase:8090
      - POCKETBASE_ADMIN_EMAIL=${POCKETBASE_ADMIN_EMAIL}
      - POCKETBASE_ADMIN_PASSWORD=${POCKETBASE_ADMIN_PASSWORD}
      - BANK_NAME=${BANK_NAME}
      - BANK_ACC_NUM=${BANK_ACC_NUM}
      - BANK_ACC_NAME=${BANK_ACC_NAME}
      - QR_CODE_FILE=${QR_CODE_FILE}
      - SUPPORT_WHATSAPP=${SUPPORT_WHATSAPP}
    networks:
      - risev-network

  # Portainer Visual Container Console
  portainer:
    image: portainer/portainer-ce:latest
    container_name: risev-portainer
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - risev-network

volumes:
  caddy_data:
  caddy_config:
  portainer_data:

networks:
  risev-network:
    driver: bridge
