version: '3.8'

services:
  # Caddy reverse proxy with automatic SSL
  caddy:
    image: caddy:latest
    container_name: risev-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN_API=${DOMAIN_API}
      - DOMAIN_EVO=${DOMAIN_EVO}
    depends_on:
      - pocketbase
      - evolution-api
    networks:
      - risev-network

  # PocketBase Go Backend
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: risev-pocketbase
    restart: unless-stopped
    working_dir: /pb
    command: serve --http=0.0.0.0:8090 --dir=/pb/pb_data --hooksDir=/pb/pb_hooks --migrationsDir=/pb/pb_migrations
    volumes:
      - ./pb_data:/pb/pb_data
      - ./pb_hooks:/pb/pb_hooks
      - ./pb_migrations:/pb/pb_migrations
    environment:
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
    networks:
      - risev-network

  # Litestream SQLite backup
  litestream:
    image: litestream/litestream:latest
    container_name: risev-litestream
    restart: unless-stopped
    volumes:
      - ./pb_data:/pb_data
      - ./litestream.yml:/etc/litestream.yml
    command: replicate
    depends_on:
      - pocketbase
    environment:
      - AWS_ACCESS_KEY_ID=${S3_ACCESS_KEY}
      - AWS_SECRET_ACCESS_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET}
      - S3_REGION=${S3_REGION}
    networks:
      - risev-network

  # Evolution API DB (PostgreSQL)
  evolution-db:
    image: postgres:15-alpine
    container_name: risev-evolution-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${EVOLUTION_DB_USER}
      POSTGRES_PASSWORD: ${EVOLUTION_DB_PASSWORD}
      POSTGRES_DB: ${EVOLUTION_DB_NAME}
    volumes:
      - ./evolution_db_data:/var/lib/postgresql/data
    networks:
      - risev-network

  # Evolution API Cache (Redis)
  evolution-redis:
    image: redis:alpine
    container_name: risev-evolution-redis
    restart: unless-stopped
    volumes:
      - ./evolution_redis_data:/data
    networks:
      - risev-network

  # Evolution API Whatsapp Service
  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: risev-evolution-api
    restart: unless-stopped
    depends_on:
      - evolution-db
      - evolution-redis
    environment:
      - SERVER_TYPE=http
      - SERVER_PORT=8080
      - SERVER_URL=${EVOLUTION_API_URL}
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${EVOLUTION_DB_USER}:${EVOLUTION_DB_PASSWORD}@evolution-db:5432/${EVOLUTION_DB_NAME}?schema=public
      - DATABASE_CONNECTION_CLIENT_NAME=risev
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://evolution-redis:6379/1
      - CACHE_REDIS_PREFIX_KEY=evolution
      - CACHE_LOCAL_ENABLED=false
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=false
      - DATABASE_SAVE_DATA_CONTACTS=false
      - DATABASE_SAVE_DATA_CHATS=false
      - DATABASE_SAVE_DATA_HISTORIC=false
      - DATABASE_SAVE_MESSAGE_UPDATE=false
      - DATABASE_SAVE_DATA_LABELS=false
    networks:
      - risev-network

  # Telegram Auto Payment & Gemini Receipt Verification Bot
  payment-bot:
    build:
      context: ../payment-bot
      dockerfile: Dockerfile
    container_name: risev-payment-bot
    restart: unless-stopped
    depends_on:
      - pocketbase
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - POCKETBASE_URL=http://pocketbase:8090
      - POCKETBASE_ADMIN_EMAIL=${POCKETBASE_ADMIN_EMAIL}
      - POCKETBASE_ADMIN_PASSWORD=${POCKETBASE_ADMIN_PASSWORD}
    networks:
      - risev-network

volumes:
  caddy_data:
  caddy_config:

networks:
  risev-network:
    driver: bridge

